name: Weekly ACLED Trends scrape & publish

on:
  schedule:
    # Daily 10:00 UTC. ACLED refreshes the measured 4-week window mid-week
    # (~Wednesday); running daily captures each new report within a day.
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Scrape ACLED Trends → blob
        run: uv run python pipelines/run_scrape.py
        env:
          DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}

      - name: Build encrypted download site
        run: uv run python pipelines/build_site.py
        env:
          DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v5
