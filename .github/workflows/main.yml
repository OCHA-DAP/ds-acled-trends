name: Weekly ACLED Trends scrape

on:
  schedule:
    - cron: '0 10 * * 1'  # Every Monday 10:00 UTC
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run scraper
        run: uv run python pipelines/run_scrape.py
        env:
          DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
